name: Weekly Circular Sync

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Discover only, don't commit"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install scraper deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch new circulars
        id: fetch
        run: |
          set -e
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/fetch_circulars.py --dry-run
          else
            python scripts/fetch_circulars.py
          fi

      - name: Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain ingestion/sample_docs scripts/fetched_manifest.json)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with new circulars
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: weekly circular sync"
          branch: bot/weekly-circulars
          delete-branch: true
          title: "chore: weekly circular sync"
          body: |
            Automated update from the weekly circular sync workflow.

            New regulatory PDFs were discovered on the RBI / SEBI websites and
            staged under `ingestion/sample_docs/`. Merging this PR triggers a
            re-ingestion on the next deploy so the ChromaDB index picks up the
            new content.

            Please skim the included filenames before merging.
          add-paths: |
            ingestion/sample_docs/**
            scripts/fetched_manifest.json
