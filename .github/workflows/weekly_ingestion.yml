name: Daily Circular Sync

on:
  schedule:
    # Runs Mon–Fri at 07:00 UTC (after Indian market pre-open, before open)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Discover links only — do not download or commit"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install scraper deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch new circulars
        run: |
          set -e
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/fetch_circulars.py --dry-run
          else
            python scripts/fetch_circulars.py
          fi

      - name: Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain ingestion/sample_docs scripts/fetched_manifest.json)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push new circulars
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ingestion/sample_docs scripts/fetched_manifest.json
          COUNT=$(git diff --cached --name-only | grep -c 'sample_docs' || true)
          git commit -m "chore: daily circular sync — ${COUNT} new file(s) [skip ci]"
          git push origin main
