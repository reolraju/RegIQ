services:
  ingestion:
    build:
      context: ./ingestion
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_DIR=/chroma_data
      - CHROMA_COLLECTION=regiq
      - DOCS_DIR=/app/sample_docs
    volumes:
      - chroma_data:/chroma_data
    restart: "no"   # runs once to index docs, then exits

  backend:
    build:
      context: ./backend
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_DIR=/chroma_data
      - CHROMA_COLLECTION=regiq
      - TOP_K=5
      - CANDIDATE_K=20
      - RERANK_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2
    volumes:
      - chroma_data:/chroma_data
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      ingestion:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./frontend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
  hf_cache:
